        {% block header %}
        <div id="header">
            <div id="header-left">
                <div id="header-logo" onclick="window.location.href='/'">

                </div>
            </div>
            <div id="header-right">

                <span id="header-phone">+1 619 919 40 24</span>
            </div>
        </div>
        {% endblock %}

        {% block content %}{% endblock %}

        {% block footer %}
        <div id="footer">
            <img id="footer-logo" onclick="window.location.href='/'" src="/static/images/logo.png" alt="Motyve logo">

                <div id="footer-section-title">Sections</div>
                <div id="footer-section-values">
                    <a class="footer-section-value" href="/policy">Policy</a>
                </div>
            </div>
            <div id="footer-contact">

                <div id="footer-contact-values">
                    <div class="footer-contact-value">
                        <img id="footer-contact-value-icon" src="/static/icons/location-outline.svg">

                    </div>

                    </a>

                        </div>
                    </a>
                </div>
